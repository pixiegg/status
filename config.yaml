web:
  port: ${PORT}

ui:
  title: "Pixie • Status do sistema"
  description: "Confira se o Pixie está funcionando como esperado."
  dashboard-heading: "Status do sistema"
  dashboard-subheading: "Confira se o Pixie está funcionando como esperado."
  header: "Pixie"
  dark-mode: false

.default-public-endpoint: &public_settings
  interval: 1m
  ui:
    hide-url: true
    hide-hostname: true
    hide-port: true
    hide-conditions: true
    hide-errors: true

storage:
  type: postgres
  path: "${DATABASE_URL}"

endpoints:
  - name: "Health Check - Pix"
    group: "Serviços Internos"
    url: "https://api-v2-684289935571.us-central1.run.app/internal/health/pix"
    method: GET
    headers:
      x-token: "CbJejNf6Fg3+IDgYUOZUZZDm/bFuOE280NZ+5Rect2Q="
    <<: *public_settings
    conditions:
      - "[STATUS] < 400"

  - name: "Health Check - Internacional"
    group: "Serviços Internos"
    url: "https://api-v2-684289935571.us-central1.run.app/internal/health/intl"
    method: GET
    headers:
      x-token: "CbJejNf6Fg3+IDgYUOZUZZDm/bFuOE280NZ+5Rect2Q="
    <<: *public_settings
    conditions:
      - "[STATUS] < 400"

  - name: "Health Check - AI Voices"
    group: "Serviços Internos"
    url: "https://api-v2-684289935571.us-central1.run.app/internal/health/ai-voices"
    method: GET
    headers:
      x-token: "CbJejNf6Fg3+IDgYUOZUZZDm/bFuOE280NZ+5Rect2Q="
    <<: *public_settings
    conditions:
      - "[STATUS] < 400"

  - name: "API"
    group: "Plataforma Pixie"
    url: "https://api.pixie.gg"
    method: GET
    <<: *public_settings
    conditions:
      - "[STATUS] < 400"

  - name: "Landing"
    group: "Plataforma Pixie"
    url: "https://pixie.gg"
    method: GET
    <<: *public_settings
    conditions:
      - "[STATUS] < 400"

  - name: "Dashboard"
    group: "Plataforma Pixie"
    url: "https://dashboard.pixie.gg"
    method: GET
    <<: *public_settings
    conditions:
      - "[STATUS] < 400"
